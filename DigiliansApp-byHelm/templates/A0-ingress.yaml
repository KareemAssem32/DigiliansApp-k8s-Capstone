apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
spec:
  rules:
    - host: {{ .Values.ingress.frontend.host }}
      http:
        paths:
        - path: {{ .Values.ingress.frontend.path }}
          pathType: {{ .Values.ingress.frontend.pathType }}
          backend:
            service:
              name: {{ .Values.ingress.frontend.service.name }}
              port:
                number: {{ .Values.ingress.frontend.service.port }}
    - host: {{ .Values.ingress.backend.host }}
      http:
        paths:
        - path: {{ .Values.ingress.backend.path }}
          pathType: {{ .Values.ingress.backend.pathType }}
          backend:
            service:
              name: {{ .Values.ingress.backend.service.name }}
              port:
                number: {{ .Values.ingress.backend.service.port }}